  .prog-title { font-family:'Nunito',sans-serif; font-size:14px; font-weight:800; color:var(--text); }

  .prog-pct { font-family:'Nunito',sans-serif; font-size:12px; font-weight:800; color:var(--coral); text-align:right; margin-top:5px; }

  .tab-scroll { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .tab-scroll::-webkit-scrollbar { display:none; }
  .tab-btn { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 14px 14px; border-radius:16px; cursor:pointer; border:2px solid transparent; background:var(--white); box-shadow:var(--shadow-sm); transition:all .18s; min-width:70px; position:relative; }
  .tab-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
  .tab-btn.active { border-color:var(--active-color,#FF6B6B); background:var(--active-bg,#FFF0F0); box-shadow:var(--shadow-md); transform:translateY(-2px); }
  .tab-emoji { font-size:22px; line-height:1; }
  .tab-name { font-size:10px; font-weight:700; color:var(--text-mid); white-space:nowrap; }

  .tab-mini-bar { position:absolute; bottom:6px; left:50%; transform:translateX(-50%); height:3px; width:28px; border-radius:99px; background:var(--border); overflow:hidden; }
  .tab-mini-fill { height:100%; width:0%; background:var(--active-color,#FF6B6B); border-radius:99px; transition:width .3s; }

  .panel-shell { max-width:680px; margin:16px auto 0; padding:0 16px 80px; }

  .panel.active { display:block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .action-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .aBtn { padding:7px 14px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; border:1.5px solid var(--border); background:var(--white); color:var(--text-mid); transition:all .15s; font-family:'Noto Sans KR',sans-serif; }

  .cl-item:last-child { border-bottom:none; }
  .cl-item:hover { background:#FAFAFA; }
  .cl-item.checked .item-label { color:var(--text-light); text-decoration:line-through; }
  .chkbox { width:22px; height:22px; border-radius:7px; flex-shrink:0; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; transition:all .15s; background:var(--white); }
  .cl-item.checked .chkbox { background:var(--teal); border-color:var(--teal); }
  .chk-svg { width:12px; height:12px; opacity:0; transition:opacity .12s; }

  .item-label { flex:1; font-size:13.5px; color:var(--text); font-weight:500; line-height:1.4; }

  .leg-dot { width:7px; height:7px; border-radius:50%; }

  .confetti-layer { position:fixed; inset:0; pointer-events:none; z-index:999; overflow:hidden; display:none; }
  .confetti-layer.on { display:block; }
  .cp { position:absolute; width:9px; height:9px; border-radius:2px; animation:fall linear forwards; }
  @keyframes fall { 0%{opacity:1;transform:translateY(-30px) rotate(0)} 100%{opacity:0;transform:translateY(110vh) rotate(900deg)} }

  footer { text-align:center; padding:20px 16px 40px; font-size:12px; color:var(--text-light); }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px); background:#1E1B4B; color:white; padding:10px 20px; border-radius:99px; font-size:13px; font-weight:600; opacity:0; transition:all .3s; z-index:1000; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

      {t:"소형 데이 백팩 (관광용)", tag:null},
      {t:"크로스백 또는 힙색 (귀중품 보관)", tag:null},
      {t:"지퍼백 대형 (젖은 수영복 분리 보관)", tag:null},
      {t:"목베개 (비행기 4.5시간)", tag:null},
      {t:"기내 안대·귀마개 (우주 수면용)", tag:"kid"},
      {t:"우산 또는 우비 (스콜 대비 필수!)", tag:null},
      {t:"세면 파우치 (샴푸·칫솔·면도기)", tag:null},
      {t:"물티슈 다량 (더운 날씨 필수 아이템)", tag:null},
    ]},
];

const CUSTOM_TAB = { id:"custom", emoji:"✏️", title:"내 추가", color:"#FDF4FF", acColor:"#9333EA", acBg:"#FAF5FF", sub:"우리만의 추가 항목 자유롭게!" };
const TAG_LABELS = {must:"필수", kid:"우주", sport:"운동", doc:"서류"};
const WHO_INFO = { sj:{name:"성준",color:"#FF6B6B",short:"성"}, wj:{name:"원주",color:"#A78BFA",short:"원"} };

let db = null;
let currentWho = "sj";
let totalFixed = 0;
let localState = {};
let customItems = {}; // { id: { text, checked, who, createdAt } }

function initFirebase() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    db.ref("checklist").on("value", function(snap) {
      localState = snap.val() || {};
      renderAllItems();
      updateAllBadges();
      updateGlobalProgress();
      setSyncStatus(true);
    }, function() { setSyncStatus(false); });
    db.ref("custom").on("value", function(snap) {
      customItems = snap.val() || {};
      renderCustomItems();
      updateCustomBadge();
      updateGlobalProgress();
    });
    db.ref(".info/connected").on("value", function(snap) { setSyncStatus(snap.val() === true); });
  } catch(e) { console.warn("Firebase init failed:", e); setSyncStatus(false); }
}

function setSyncStatus(online) {
  var dot = document.getElementById("sync-dot");
  var txt = document.getElementById("sync-text");
  if (online) { dot.classList.remove("offline"); txt.textContent = "실시간 동기화 중 🔗"; }
  else { dot.classList.add("offline"); txt.textContent = "오프라인 모드"; }
}

function setWho(who) {
  currentWho = who;
  document.getElementById("who-sj").classList.toggle("active", who === "sj");
  document.getElementById("who-wj").classList.toggle("active", who === "wj");
  showToast(WHO_INFO[who].name + "님으로 체크합니다");
}

function init() {
  SECTIONS.forEach(function(s) { totalFixed += s.items.length; });
  buildTabs();
  buildPanels();
  buildCustomPanel();
  switchTab(SECTIONS[0].id);
  updateGlobalProgress();
  initFirebase();
}

function buildTabs() {
  var wrap = document.getElementById("tab-scroll");
  SECTIONS.forEach(function(sec) {
    var btn = document.createElement("div");
    btn.className = "tab-btn"; btn.id = "tab-" + sec.id;
    btn.style.setProperty("--active-color", sec.acColor);
    btn.style.setProperty("--active-bg", sec.acBg);
    btn.innerHTML = '<span class="tab-emoji">' + sec.emoji + '</span><span class="tab-name">' + sec.title + '</span><div class="tab-mini-bar"><div class="tab-mini-fill" id="mini-' + sec.id + '"></div></div>';
    btn.onclick = function() { switchTab(sec.id); };
    wrap.appendChild(btn);
  });
  // 커스텀 탭 버튼 (별도 스타일)
  var customBtn = document.createElement("div");
  customBtn.className = "tab-btn"; customBtn.id = "tab-custom";
  customBtn.style.setProperty("--active-color", CUSTOM_TAB.acColor);
  customBtn.style.setProperty("--active-bg", CUSTOM_TAB.acBg);
  customBtn.style.border = "2px dashed #D8B4FE";
  customBtn.innerHTML = '<span class="tab-emoji">' + CUSTOM_TAB.emoji + '</span><span class="tab-name">' + CUSTOM_TAB.title + '</span><div class="tab-mini-bar"><div class="tab-mini-fill" id="mini-custom"></div></div>';
  customBtn.onclick = function() { switchTab("custom"); };
  wrap.appendChild(customBtn);
}

function buildPanels() {
  var shell = document.getElementById("panel-shell");
  SECTIONS.forEach(function(sec) {
    var panel = document.createElement("div");
    panel.className = "panel"; panel.id = "panel-" + sec.id;
    var itemsHtml = "";
    sec.items.forEach(function(item, i) {
      itemsHtml += '<div class="cl-item" id="item-' + sec.id + '-' + i + '" onclick="toggleItem(\'' + sec.id + '\',' + i + ')">' +
        '<div class="chkbox"><svg class="chk-svg" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>' +
        '<span class="item-label">' + item.t + '</span>' +
        (item.tag ? '<span class="tag tag-' + item.tag + '">' + TAG_LABELS[item.tag] + '</span>' : '') +
        '<div class="item-who" id="who-' + sec.id + '-' + i + '"></div>' +
        '</div>';
    });
    panel.innerHTML =
      '<div class="panel-header"><div class="panel-icon" style="background:' + sec.color + '">' + sec.emoji + '</div>' +
      '<div style="flex:1;min-width:0"><div class="panel-title">' + sec.title + '</div><div class="panel-sub">' + sec.sub + '</div></div>' +
      '<span class="panel-badge" id="pbadge-' + sec.id + '">0 / ' + sec.items.length + '</span></div>' +
      '<div class="action-row"><button class="aBtn green" onclick="checkTab(\'' + sec.id + '\')">✅ 전체 체크</button>' +
      '<button class="aBtn red" onclick="resetTab(\'' + sec.id + '\')">↺ 초기화</button></div>' +
      '<div class="items-card">' + itemsHtml + '</div>';
    shell.appendChild(panel);
  });
}

function buildCustomPanel() {
  var shell = document.getElementById("panel-shell");
  var panel = document.createElement("div");
  panel.className = "panel"; panel.id = "panel-custom";
  panel.innerHTML =
    '<div class="panel-header"><div class="panel-icon" style="background:' + CUSTOM_TAB.color + '">' + CUSTOM_TAB.emoji + '</div>' +
    '<div style="flex:1;min-width:0"><div class="panel-title">' + CUSTOM_TAB.title + '</div><div class="panel-sub">' + CUSTOM_TAB.sub + '</div></div>' +
    '<span class="panel-badge" id="pbadge-custom">0 / 0</span></div>' +
    '<div class="add-form">' +
      '<div class="add-form-title">✍️ 새 항목 추가 — 성준·원주 둘 다 보여요!</div>' +
      '<div class="add-input-row">' +
        '<input class="add-input" id="custom-input" type="text" placeholder="예) 우주 수영 튜브, 여행용 드라이기..." maxlength="60" onkeydown="if(event.key===\'Enter\')addCustomItem()" />' +
        '<button class="add-submit" onclick="addCustomItem()">+ 추가</button>' +
      '</div>' +
    '</div>' +
    '<div id="custom-items-wrap"></div>';
  shell.appendChild(panel);
}

function renderCustomItems() {
  var wrap = document.getElementById("custom-items-wrap");
  if (!wrap) return;
  var keys = Object.keys(customItems).sort(function(a,b) {
    return (customItems[a].createdAt||0) - (customItems[b].createdAt||0);
  });
  if (keys.length === 0) {
    wrap.innerHTML = '<div class="custom-empty"><div class="custom-empty-icon">🌟</div><div class="custom-empty-text">아직 추가한 항목이 없어요</div><div class="custom-empty-sub">위에서 새 항목을 입력해보세요!</div></div>';
    return;
  }
  var html = '<div class="items-card">';
  keys.forEach(function(key) {
    var item = customItems[key];
    var whoHtml = "";
    if (item.checked && item.who && WHO_INFO[item.who]) {
      var w = WHO_INFO[item.who];
      whoHtml = '<div class="iw-avatar" style="background:' + w.color + '">' + w.short + '</div>';
    }
    html += '<div class="cl-item' + (item.checked ? ' checked' : '') + '" id="citem-' + key + '">' +
      '<div class="chkbox" onclick="toggleCustomItem(\'' + key + '\')" style="flex-shrink:0">' +
        '<svg class="chk-svg" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
      '</div>' +
      '<span class="item-label" onclick="toggleCustomItem(\'' + key + '\')">' + escHtml(item.text) + '</span>' +
      '<div class="item-who">' + whoHtml + '</div>' +
      '<button class="del-btn" onclick="deleteCustomItem(\'' + key + '\')" title="삭제">×</button>' +
      '</div>';
  });
  html += '</div>';
  wrap.innerHTML = html;
}

function addCustomItem() {
  var input = document.getElementById("custom-input");
  var text = input.value.trim();
  if (!text) { input.focus(); return; }
  var key = "c_" + Date.now();
  var val = { text:text, checked:false, who:null, createdAt:Date.now() };
  customItems[key] = val;
  if (db) {
    db.ref("custom/" + key).set(val);
  } else {
    renderCustomItems();
    updateCustomBadge();
    updateGlobalProgress();
  }
  input.value = "";
  input.focus();
  showToast("'" + text + "' 추가됐어요!");
}

function toggleCustomItem(key) {
  var item = customItems[key];
  if (!item) return;
  item.checked = !item.checked;
  item.who = item.checked ? currentWho : null;
  customItems[key] = item;
  if (db) db.ref("custom/" + key).set(item);
  else { renderCustomItems(); updateCustomBadge(); updateGlobalProgress(); }
}

function deleteCustomItem(key) {
  delete customItems[key];
  if (db) db.ref("custom/" + key).remove();
  else { renderCustomItems(); updateCustomBadge(); updateGlobalProgress(); }
}

function updateCustomBadge() {
  var keys = Object.keys(customItems);
  var total = keys.length;
  var done = keys.filter(function(k){ return customItems[k].checked; }).length;
  var badge = document.getElementById("pbadge-custom");
  if (badge) { badge.textContent = done + " / " + total; badge.className = "panel-badge" + (total > 0 && done === total ? " done" : ""); }
  var mini = document.getElementById("mini-custom");
  if (mini) mini.style.width = (total ? Math.round(done/total*100) : 0) + "%";
}

function toggleItem(secId, idx) {
  var key = secId + "-" + idx;
  var cur = localState[key];
  var newChecked = !(cur && cur.checked);
  var newVal = newChecked ? {checked:true,who:currentWho} : {checked:false,who:null};
  localState[key] = newVal;
  applyItemUI(secId, idx, newVal);
  updateTabBadge(secId);
  updateGlobalProgress();
  if (db) db.ref("checklist/" + key).set(newVal);
}

function applyItemUI(secId, idx, val) {
  var el = document.getElementById("item-" + secId + "-" + idx);
  var whoEl = document.getElementById("who-" + secId + "-" + idx);
  if (!el) return;
  if (val && val.checked) {
    el.classList.add("checked");
    if (val.who && WHO_INFO[val.who]) {
      var w = WHO_INFO[val.who];
      whoEl.innerHTML = '<div class="iw-avatar" style="background:' + w.color + '">' + w.short + '</div>';
    }
  } else { el.classList.remove("checked"); whoEl.innerHTML = ""; }
}

function renderAllItems() {
  SECTIONS.forEach(function(sec) {
    sec.items.forEach(function(_, i) { applyItemUI(sec.id, i, localState[sec.id + "-" + i]); });
  });
}

function checkTab(secId) {
  var sec = SECTIONS.find(function(s){ return s.id === secId; });
  var updates = {};
  sec.items.forEach(function(_, i) {
    var key = secId + "-" + i; var val = {checked:true,who:currentWho};
    localState[key] = val; applyItemUI(secId, i, val); updates["checklist/"+key] = val;
  });
  updateTabBadge(secId); updateGlobalProgress();
  if (db) db.ref().update(updates);
}

function resetTab(secId) {
  var sec = SECTIONS.find(function(s){ return s.id === secId; });
  var updates = {};
  sec.items.forEach(function(_, i) {
    var key = secId + "-" + i; var val = {checked:false,who:null};
    localState[key] = val; applyItemUI(secId, i, val); updates["checklist/"+key] = val;
  });
  updateTabBadge(secId); updateGlobalProgress();
  if (db) db.ref().update(updates);
}

function updateTabBadge(secId) {
  var sec = SECTIONS.find(function(s){ return s.id === secId; });
  var cnt = sec.items.filter(function(_, i){ return localState[secId+"-"+i] && localState[secId+"-"+i].checked; }).length;
  var badge = document.getElementById("pbadge-" + secId);
  if (badge) { badge.textContent = cnt + " / " + sec.items.length; badge.className = "panel-badge" + (cnt === sec.items.length ? " done" : ""); }
  var mini = document.getElementById("mini-" + secId);
  if (mini) mini.style.width = (sec.items.length ? Math.round(cnt/sec.items.length*100) : 0) + "%";
}

function updateAllBadges() { SECTIONS.forEach(function(s){ updateTabBadge(s.id); }); updateCustomBadge(); }

function updateGlobalProgress() {
  var fixedDone = SECTIONS.reduce(function(a, s) {
    return a + s.items.filter(function(_, i){ return localState[s.id+"-"+i] && localState[s.id+"-"+i].checked; }).length;
  }, 0);
  var custKeys = Object.keys(customItems);
  var custTotal = custKeys.length;
  var custDone = custKeys.filter(function(k){ return customItems[k].checked; }).length;
  var total = totalFixed + custTotal;
  var done = fixedDone + custDone;
  var pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-pct").textContent = pct + "%";
  document.getElementById("prog-nums").textContent = done + " / " + total;
  if (total > 0 && pct === 100) celebrate();
}

function switchTab(id) {
  document.querySelectorAll(".tab-btn").forEach(function(b){ b.classList.remove("active"); });
  document.querySelectorAll(".panel").forEach(function(p){ p.classList.remove("active"); });
  document.getElementById("tab-" + id).classList.add("active");
  document.getElementById("panel-" + id).classList.add("active");
  document.getElementById("tab-" + id).scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
}

function escHtml(t) { return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2200);
}

function celebrate() {
  var wrap = document.getElementById("confetti");
  wrap.innerHTML = ""; wrap.classList.add("on");
  var cols = ["#FF6B6B","#FBBF24","#00C9A7","#A78BFA","#38BDF8","#F472B6","#34D399"];
  for (var i = 0; i < 70; i++) {
    var p = document.createElement("div"); p.className = "cp";
    var sz = 6 + Math.random()*8;
    p.style.cssText = "left:"+Math.random()*100+"%;top:"+(- 10-Math.random()*50)+"px;width:"+sz+"px;height:"+sz+"px;background:"+cols[Math.floor(Math.random()*cols.length)]+";animation-delay:"+Math.random()*.8+"s;animation-duration:"+(1.4+Math.random()*.8)+"s;border-radius:"+(Math.random()>.5?'50%':'2px');
    wrap.appendChild(p);
  }
  setTimeout(function(){ wrap.classList.remove("on"); }, 3500);
}

init();
</script>
</body>
</html>
