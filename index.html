<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>싱가포르 여행 체크리스트 🇸🇬</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #FF6B6B; --amber: #FBBF24; --teal: #00C9A7;
    --text: #1E1B4B; --text-mid: #6B7280; --text-light: #9CA3AF;
    --bg: #F5F6FF; --white: #FFFFFF; --border: #E5E7EB;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md: 0 6px 20px rgba(0,0,0,0.10);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .hero {
    background: linear-gradient(135deg,#FF6B6B 0%,#FF8E53 45%,#FBBF24 100%);
    padding: 36px 20px 56px; text-align:center; position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.12) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.08) 0%, transparent 50%);
  }
  .hero-flag { font-size:48px; display:block; margin-bottom:8px; position:relative; animation:bob 2.5s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-8px) rotate(3deg)} }
  .hero h1 { font-family:'Nunito',sans-serif; font-size:clamp(22px,5vw,34px); font-weight:900; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,0.18); margin-bottom:5px; position:relative; }
  .hero-sub { font-size:14px; color:rgba(255,255,255,0.88); font-weight:600; margin-bottom:14px; position:relative; }
  .hero-pills { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; position:relative; margin-bottom:12px; }
  .hero-pill { background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.35); border-radius:99px; padding:5px 13px; font-size:11px; color:#fff; font-weight:600; }

  /* SYNC STATUS */
  .sync-badge {
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.35);
    border-radius:99px; padding:5px 13px; font-size:12px; color:#fff; font-weight:600;
    position:relative;
  }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:#4ADE80; animation:pulse 2s ease-in-out infinite; flex-shrink:0; }
  .sync-dot.offline { background:#FCA5A5; animation:none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* WHO INDICATOR */
  .who-row { display:flex; gap:8px; justify-content:center; margin-top:10px; position:relative; }
  .who-pill {
    display:flex; align-items:center; gap:5px;
    background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3);
    border-radius:99px; padding:4px 12px; font-size:12px; color:#fff; font-weight:600; cursor:pointer;
    transition:all .15s;
  }
  .who-pill.active { background:rgba(255,255,255,0.35); border-color:rgba(255,255,255,0.6); }
  .who-avatar { width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; }

  .prog-card { max-width:680px; margin:-22px auto 0; padding:18px 22px; background:var(--white); border-radius:20px; box-shadow:var(--shadow-md); position:relative; z-index:20; }
  .prog-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .prog-title { font-family:'Nunito',sans-serif; font-size:14px; font-weight:800; color:var(--text); }
  .prog-nums { font-size:12px; color:var(--text-mid); font-weight:600; }
  .prog-track { height:9px; background:var(--border); border-radius:99px; overflow:hidden; }
  .prog-fill { height:100%; width:0%; border-radius:99px; background:linear-gradient(90deg,#FF6B6B,#FBBF24); transition:width .4s cubic-bezier(.4,0,.2,1); }
  .prog-pct { font-family:'Nunito',sans-serif; font-size:12px; font-weight:800; color:var(--coral); text-align:right; margin-top:5px; }

  .tab-shell { max-width:680px; margin:20px auto 0; padding:0 16px; }
  .tab-scroll { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .tab-scroll::-webkit-scrollbar { display:none; }
  .tab-btn {
    flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:10px 14px 14px; border-radius:16px; cursor:pointer;
    border:2px solid transparent; background:var(--white);
    box-shadow:var(--shadow-sm); transition:all .18s; min-width:70px; position:relative;
  }
  .tab-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
  .tab-btn.active { border-color:var(--active-color,#FF6B6B); background:var(--active-bg,#FFF0F0); box-shadow:var(--shadow-md); transform:translateY(-2px); }
  .tab-emoji { font-size:22px; line-height:1; }
  .tab-name { font-size:10px; font-weight:700; color:var(--text-mid); white-space:nowrap; }
  .tab-btn.active .tab-name { color:var(--active-color,#FF6B6B); }
  .tab-mini-bar { position:absolute; bottom:6px; left:50%; transform:translateX(-50%); height:3px; width:28px; border-radius:99px; background:var(--border); overflow:hidden; }
  .tab-mini-fill { height:100%; width:0%; background:var(--active-color,#FF6B6B); border-radius:99px; transition:width .3s; }

  .panel-shell { max-width:680px; margin:16px auto 0; padding:0 16px 80px; }
  .panel { display:none; animation:fadeIn .22s ease; }
  .panel.active { display:block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .panel-header { display:flex; align-items:center; gap:14px; background:var(--white); border-radius:18px; padding:16px 18px; box-shadow:var(--shadow-sm); margin-bottom:12px; }
  .panel-icon { width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
  .panel-title { font-family:'Nunito',sans-serif; font-size:18px; font-weight:900; color:var(--text); }
  .panel-sub { font-size:12px; color:var(--text-light); font-weight:500; margin-top:2px; }
  .panel-badge { margin-left:auto; font-size:13px; font-weight:800; padding:5px 13px; border-radius:99px; background:var(--bg); color:var(--text-mid); white-space:nowrap; transition:all .2s; }
  .panel-badge.done { background:#DCFCE7; color:#166534; }

  .action-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .aBtn { padding:7px 14px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; border:1.5px solid var(--border); background:var(--white); color:var(--text-mid); transition:all .15s; font-family:'Noto Sans KR',sans-serif; }
  .aBtn:hover { border-color:var(--coral); color:var(--coral); transform:translateY(-1px); }
  .aBtn.green { background:#F0FDF4; border-color:#86EFAC; color:#166534; }
  .aBtn.red { background:#FFF5F5; border-color:#FCA5A5; color:#991B1B; }

  .items-card { background:var(--white); border-radius:18px; box-shadow:var(--shadow-sm); overflow:hidden; }
  .cl-item { display:flex; align-items:center; gap:12px; padding:13px 18px; cursor:pointer; transition:background .1s; border-bottom:1px solid #F3F4F6; position:relative; }
  .cl-item:last-child { border-bottom:none; }
  .cl-item:hover { background:#FAFAFA; }
  .cl-item.checked .item-label { color:var(--text-light); text-decoration:line-through; }

  .chkbox { width:22px; height:22px; border-radius:7px; flex-shrink:0; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; transition:all .15s; background:var(--white); }
  .cl-item.checked .chkbox { background:var(--teal); border-color:var(--teal); }
  .chk-svg { width:12px; height:12px; opacity:0; transition:opacity .12s; }
  .cl-item.checked .chk-svg { opacity:1; }

  .item-label { flex:1; font-size:13.5px; color:var(--text); font-weight:500; line-height:1.4; }
  .tag { font-size:10px; font-weight:700; padding:3px 8px; border-radius:99px; flex-shrink:0; }
  .tag-must { background:#FEE2E2; color:#991B1B; }
  .tag-kid  { background:#EDE9FE; color:#5B21B6; }
  .tag-sport{ background:#DCFCE7; color:#166534; }
  .tag-doc  { background:#FEF3C7; color:#92400E; }

  /* WHO CHECKED AVATAR on item */
  .item-who { position:absolute; right:14px; top:50%; transform:translateY(-50%); display:flex; gap:3px; }
  .iw-avatar { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:white; }

  .legend { display:flex; gap:10px; justify-content:flex-end; padding:10px 16px 0; flex-wrap:wrap; }
  .leg { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text-mid); font-weight:600; }
  .leg-dot { width:7px; height:7px; border-radius:50%; }

  .confetti-layer { position:fixed; inset:0; pointer-events:none; z-index:999; overflow:hidden; display:none; }
  .confetti-layer.on { display:block; }
  .cp { position:absolute; width:9px; height:9px; border-radius:2px; animation:fall linear forwards; }
  @keyframes fall { 0%{opacity:1;transform:translateY(-30px) rotate(0)} 100%{opacity:0;transform:translateY(110vh) rotate(900deg)} }

  footer { text-align:center; padding:20px 16px 40px; font-size:12px; color:var(--text-light); }
  footer strong { color:var(--coral); font-weight:700; }

  /* Toast */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px); background:#1E1B4B; color:white; padding:10px 20px; border-radius:99px; font-size:13px; font-weight:600; opacity:0; transition:all .3s; z-index:1000; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

let db = null;
let currentWho = "sj";
let totalItems = 0;
let localState = {}; // { "doc-0": { checked: true, who: "sj" }, ... }
let isFirebaseReady = false;

/* ── Firebase init ── */
function initFirebase() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    const ref = db.ref("checklist");
    ref.on("value", snap => {
      const data = snap.val() || {};
      localState = data;
      renderAllItems();
      updateAllBadges();
      updateGlobalProgress();
      setSyncStatus(true);
    }, err => {
      console.warn("Firebase error:", err);
      setSyncStatus(false);
    });
    db.ref(".info/connected").on("value", snap => setSyncStatus(snap.val() === true));
  } catch(e) {
    console.warn("Firebase init failed:", e);
    setSyncStatus(false);
    showToast("⚠️ Firebase config를 설정해주세요!");
  }
}

function setSyncStatus(online) {
  isFirebaseReady = online;
  const dot = document.getElementById("sync-dot");
  const txt = document.getElementById("sync-text");
  if (online) { dot.classList.remove("offline"); txt.textContent = "실시간 동기화 중 🔗"; }
  else { dot.classList.add("offline"); txt.textContent = "오프라인 모드"; }
}

/* ── WHO ── */
function setWho(who) {
  currentWho = who;
  document.getElementById("who-sj").classList.toggle("active", who === "sj");
  document.getElementById("who-wj").classList.toggle("active", who === "wj");
  showToast(`${WHO_INFO[who].name}님으로 체크합니다`);
}

/* ── BUILD UI ── */
function init() {
  SECTIONS.forEach(s => totalItems += s.items.length);
  buildTabs();
  buildPanels();
  switchTab(SECTIONS[0].id);
  updateGlobalProgress();
  initFirebase();
}

function buildTabs() {
  const wrap = document.getElementById("tab-scroll");
  SECTIONS.forEach(sec => {
    const btn = document.createElement("div");
    btn.className = "tab-btn"; btn.id = "tab-" + sec.id;
    btn.style.setProperty("--active-color", sec.acColor);
    btn.style.setProperty("--active-bg", sec.acBg);
    btn.innerHTML = `<span class="tab-emoji">${sec.emoji}</span><span class="tab-name">${sec.title}</span><div class="tab-mini-bar"><div class="tab-mini-fill" id="mini-${sec.id}"></div></div>`;
    btn.onclick = () => switchTab(sec.id);
    wrap.appendChild(btn);
  });
}

function buildPanels() {
  const shell = document.getElementById("panel-shell");
  SECTIONS.forEach(sec => {
    const panel = document.createElement("div");
    panel.className = "panel"; panel.id = "panel-" + sec.id;
    panel.innerHTML = `
      <div class="panel-header">
        <div class="panel-icon" style="background:${sec.color}">${sec.emoji}</div>
        <div style="flex:1;min-width:0"><div class="panel-title">${sec.title}</div><div class="panel-sub">${sec.sub}</div></div>
        <span class="panel-badge" id="pbadge-${sec.id}">0 / ${sec.items.length}</span>
      </div>
      <div class="action-row">
        <button class="aBtn green" onclick="checkTab('${sec.id}')">✅ 전체 체크</button>
        <button class="aBtn red" onclick="resetTab('${sec.id}')">↺ 초기화</button>
      </div>
      <div class="items-card" id="items-${sec.id}">
        ${sec.items.map((item,i) => `
          <div class="cl-item" id="item-${sec.id}-${i}" onclick="toggleItem('${sec.id}',${i})">
            <div class="chkbox"><svg class="chk-svg" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <span class="item-label">${item.t}</span>
            ${item.tag ? `<span class="tag tag-${item.tag}">${TAG_LABELS[item.tag]}</span>` : ""}
            <div class="item-who" id="who-${sec.id}-${i}"></div>
          </div>`).join("")}
      </div>`;
    shell.appendChild(panel);
  });
}

/* ── TOGGLE ── */
function toggleItem(secId, idx) {
  const key = `${secId}-${idx}`;
  const cur = localState[key];
  const newChecked = !(cur && cur.checked);
  const newVal = newChecked ? { checked: true, who: currentWho } : { checked: false, who: null };

  localState[key] = newVal;
  applyItemUI(secId, idx, newVal);
  updateTabBadge(secId);
  updateGlobalProgress();

  if (db) {
    db.ref("checklist/" + key).set(newVal);
  }
}

function applyItemUI(secId, idx, val) {
  const el = document.getElementById(`item-${secId}-${idx}`);
  const whoEl = document.getElementById(`who-${secId}-${idx}`);
  if (!el) return;
  if (val && val.checked) {
    el.classList.add("checked");
    if (val.who && WHO_INFO[val.who]) {
      const w = WHO_INFO[val.who];
      whoEl.innerHTML = `<div class="iw-avatar" style="background:${w.color}">${w.short}</div>`;
    }
  } else {
    el.classList.remove("checked");
    whoEl.innerHTML = "";
  }
}

function renderAllItems() {
  SECTIONS.forEach(sec => {
    sec.items.forEach((_, i) => {
      const key = `${sec.id}-${i}`;
      applyItemUI(sec.id, i, localState[key]);
    });
  });
}

/* ── BATCH ── */
function checkTab(secId) {
  const sec = SECTIONS.find(s => s.id === secId);
  const updates = {};
  sec.items.forEach((_, i) => {
    const key = `${secId}-${i}`;
    const val = { checked: true, who: currentWho };
    localState[key] = val;
    applyItemUI(secId, i, val);
    updates["checklist/" + key] = val;
  });
  updateTabBadge(secId);
  updateGlobalProgress();
  if (db) db.ref().update(updates);
}

function resetTab(secId) {
  const sec = SECTIONS.find(s => s.id === secId);
  const updates = {};
  sec.items.forEach((_, i) => {
    const key = `${secId}-${i}`;
    const val = { checked: false, who: null };
    localState[key] = val;
    applyItemUI(secId, i, val);
    updates["checklist/" + key] = val;
  });
  updateTabBadge(secId);
  updateGlobalProgress();
  if (db) db.ref().update(updates);
}

/* ── PROGRESS ── */
function updateTabBadge(secId) {
  const sec = SECTIONS.find(s => s.id === secId);
  const cnt = sec.items.filter((_, i) => localState[`${secId}-${i}`]?.checked).length;
  const total = sec.items.length;
  const badge = document.getElementById(`pbadge-${secId}`);
  if (badge) { badge.textContent = `${cnt} / ${total}`; badge.className = "panel-badge" + (cnt === total ? " done" : ""); }
  const mini = document.getElementById(`mini-${secId}`);
  if (mini) mini.style.width = (total ? Math.round(cnt/total*100) : 0) + "%";
}

function updateAllBadges() { SECTIONS.forEach(s => updateTabBadge(s.id)); }

function updateGlobalProgress() {
  const done = SECTIONS.reduce((a, s) => a + s.items.filter((_,i) => localState[`${s.id}-${i}`]?.checked).length, 0);
  const pct = totalItems ? Math.round(done / totalItems * 100) : 0;
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-pct").textContent = pct + "%";
  document.getElementById("prog-nums").textContent = `${done} / ${totalItems}`;
  if (pct === 100) celebrate();
}

/* ── TAB SWITCH ── */
function switchTab(id) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-" + id).classList.add("active");
  document.getElementById("panel-" + id).classList.add("active");
  document.getElementById("tab-" + id).scrollIntoView({behavior:"smooth", block:"nearest", inline:"center"});
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

/* ── CONFETTI ── */
function celebrate() {
  const wrap = document.getElementById("confetti");
  wrap.innerHTML = ""; wrap.classList.add("on");
  const cols = ["#FF6B6B","#FBBF24","#00C9A7","#A78BFA","#38BDF8","#F472B6","#34D399"];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement("div"); p.className = "cp";
    const s = 6 + Math.random()*8;
    p.style.cssText = `left:${Math.random()*100}%;top:${-10-Math.random()*50}px;width:${s}px;height:${s}px;background:${cols[~~(Math.random()*cols.length)]};animation-delay:${Math.random()*.8}s;animation-duration:${1.4+Math.random()*.8}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    wrap.appendChild(p);
  }
  setTimeout(() => wrap.classList.remove("on"), 3500);
}

init();
</script>
</body>
</html>
